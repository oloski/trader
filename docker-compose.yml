version: '3.8'

services:
  blackwell_trader_ai:
    container_name: blackwell_trader_ai
    image: nvidia/cuda:12.8.0-devel-ubuntu22.04  # Najnowsza baza pod Blackwell (2026)
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/app/shared_data/hf_cache
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
    volumes:
      # Mapujemy skrypty treningowe
      - /home/trader/training_scripts:/app/scripts
      # Mapujemy dysk na dane (modele, dataset, cache)
      - /home/trader/shared_data:/app/shared_data
    # Zwiększony limit pamięci współdzielonej dla modeli 100B+
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Ustawiamy working directory wewnątrz kontenera
    working_dir: /app