services:
  blackwell_trader_ai:
    container_name: blackwell_trader_ai
    build:
      context: ./agents/trading_brain
      dockerfile: Dockerfile
    environment:
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./training_scripts:/app/scripts
      - ./shared_data:/app/shared_data
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true

  dashboard:
    container_name: trader_dashboard
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./shared_data/ui:/usr/share/nginx/html:ro
    depends_on:
      - blackwell_trader_ai